services:
  - type: web
    name: poli
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: CLAUDE_API_KEY
        sync: false   # Set this manually in the Render dashboard
