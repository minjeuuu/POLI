
<!DOCTYPE html>
<html lang="en" class="w-full min-h-[100dvh] m-0 p-0 overflow-hidden bg-academic-bg dark:bg-stone-950">
  <head>
    <script>
      window.addEventListener('error', function(event) {
        fetch('/api/log-error', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: event.message,
            source: event.filename,
            lineno: event.lineno,
            colno: event.colno,
            error: event.error ? event.error.stack : null
          })
        }).catch(function() {});
      });
      window.addEventListener('unhandledrejection', function(event) {
        fetch('/api/log-error', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: 'Unhandled Rejection: ' + (event.reason ? (event.reason.message || String(event.reason)) : 'unknown'),
            error: event.reason ? event.reason.stack || String(event.reason) : null
          })
        }).catch(function() {});
      });
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#FDFBF7" />
    <title>POLI</title>
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Merriweather', 'serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              academic: {
                bg: '#FDFBF7', // Warm paper-like off-white
                paper: '#FFFFFF',
                text: '#1C1917', // Stone 900
                muted: '#57534E', // Stone 500
                line: '#E7E5E4', // Stone 200
                accent: '#0F172A', // Deep Blue
                gold: '#B45309', // Muted Gold
              }
            },
            transitionDuration: {
                '400': '400ms',
                '600': '600ms',
                '800': '800ms',
                '2000': '2000ms',
            },
            transitionTimingFunction: {
                'flow': 'cubic-bezier(0.19, 1, 0.22, 1)', // Expo Out - Extremely smooth
                'elastic': 'cubic-bezier(0.68, -0.55, 0.265, 1.55)',
            }
          },
        },
      }
    </script>
    <style>
        /* Custom Smooth Scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.5); border-radius: 20px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(75, 85, 99, 0.5); }
        
        /* Global Animation Smoothing */
        * {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* Force hardware acceleration on animateable elements for smoothness */
        .animate-in, .animate-out, .transition-all {
            will-change: transform, opacity;
            backface-visibility: hidden;
        }

        /* User Preference overrides */
        .debug-grid * {
            outline: 1px solid rgba(255, 0, 0, 0.1);
        }

            transition-duration: 0s !important;
            animation-duration: 0s !important;

        .typography-mono * { font-family: 'JetBrains Mono', monospace !important; }
        .typography-system * { font-family: system-ui, -apple-system, sans-serif !important; }
        .typography-serif * { font-family: 'Merriweather', serif !important; }

        /* User Preference: Border Radius */
        :root[data-radius="None"] .rounded-sm, :root[data-radius="None"] .rounded, :root[data-radius="None"] .rounded-md, :root[data-radius="None"] .rounded-lg, :root[data-radius="None"] .rounded-xl, :root[data-radius="None"] .rounded-2xl, :root[data-radius="None"] .rounded-3xl, :root[data-radius="None"] .rounded-full { border-radius: 0px !important; }

        :root[data-radius="Large"] .rounded-sm, :root[data-radius="Large"] .rounded, :root[data-radius="Large"] .rounded-md, :root[data-radius="Large"] .rounded-lg, :root[data-radius="Large"] .rounded-xl { border-radius: 16px !important; }
        
        :root[data-radius="Full"] .rounded-sm, :root[data-radius="Full"] .rounded, :root[data-radius="Full"] .rounded-md, :root[data-radius="Full"] .rounded-lg, :root[data-radius="Full"] .rounded-xl, :root[data-radius="Full"] .rounded-2xl { border-radius: 9999px !important; }

        /* User Preference: Density */
        :root[data-density="Compact"] .p-6 { padding: 1rem !important; }
        :root[data-density="Compact"] .p-8 { padding: 1.5rem !important; }
        :root[data-density="Compact"] .gap-4 { gap: 0.5rem !important; }
        :root[data-density="Compact"] .gap-6 { gap: 1rem !important; }
        :root[data-density="Compact"] .gap-8 { gap: 1.5rem !important; }
        :root[data-density="Compact"] .py-4 { padding-top: 0.5rem !important; padding-bottom: 0.5rem !important; }
        
        :root[data-density="Spacious"] .p-6 { padding: 2.5rem !important; }
        :root[data-density="Spacious"] .p-8 { padding: 3rem !important; }
        :root[data-density="Spacious"] .p-12 { padding: 4rem !important; }
        :root[data-density="Spacious"] .gap-4 { gap: 1.5rem !important; }
        :root[data-density="Spacious"] .gap-6 { gap: 2.5rem !important; }
        :root[data-density="Spacious"] .gap-8 { gap: 3.5rem !important; }
        /* User Preference: Blur Effects */
        :root[data-blur="false"] {
             --tw-backdrop-blur: blur(0px) !important;
        }

        /* User Preference: Reader Width */
        :root[data-reader-width="Narrow"] .max-w-4xl { max-width: 600px !important; }
        :root[data-reader-width="Wide"] .max-w-4xl { max-width: 1200px !important; }
        :root[data-reader-width="Full"] .max-w-4xl { max-width: 100% !important; }

        /* Immersive Detail Screens Layout Override */
        .fixed.inset-0.top-16 {
            top: 0px !important;
        }

        /* Print Media Styles */
        @media print {
            html, body, #root {
                height: auto !important;
                min-height: 0 !important;
                overflow: visible !important;
                position: static !important;
                width: 100% !important;
            }
            
            nav, header, button, .no-print, [role="navigation"], .lg\:flex, .mobile-nav {
                display: none !important;
            }

            .fixed > div:not(.flex-1) {
                display: none !important;
            }

            .fixed {
                position: static !important;
                height: auto !important;
                min-height: 0 !important;
                overflow: visible !important;
                inset: auto !important;
                z-index: auto !important;
                background-color: transparent !important;
            }
            
            .overflow-hidden, .overflow-y-auto, .overflow-x-auto, .custom-scrollbar {
                overflow: visible !important;
                height: auto !important;
                max-height: none !important;
            }

            .flex {
                display: block !important;
            }
            .grid {
                display: block !important;
            }
            .grid > * {
                margin-bottom: 1rem !important;
                page-break-inside: avoid !important;
            }

            body {
                background: white !important;
                color: black !important;
            }
            
            .max-w-6xl {
                max-width: 100% !important;
                width: 100% !important;
                padding: 0 !important;
                margin: 0 !important;
            }

            section, h1, h2, h3, h4, h5, h6, .bg-white, .dark\:bg-stone-900, .border {
                page-break-inside: avoid !important;
            }
        }
    </style>
</head>
  <body class="bg-academic-bg text-academic-text antialiased selection:bg-stone-200 dark:bg-stone-950 dark:text-stone-100 dark:selection:bg-indigo-900 transition-colors duration-700 ease-flow min-h-[100dvh] w-full m-0 p-0 overflow-hidden">
    <div id="root" class="w-full h-full min-h-[100dvh] bg-transparent"></div>
  <script type="module" src="/index.tsx"></script>
</body>
