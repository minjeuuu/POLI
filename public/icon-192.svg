<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E3A5F"/>
    </linearGradient>
    <linearGradient id="globe" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B45309"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="38" fill="url(#bg)"/>
  <!-- Globe circle -->
  <circle cx="96" cy="88" r="48" fill="none" stroke="url(#globe)" stroke-width="3.5"/>
  <!-- Meridians -->
  <ellipse cx="96" cy="88" rx="22" ry="48" fill="none" stroke="url(#globe)" stroke-width="2.5" opacity="0.7"/>
  <!-- Latitude lines -->
  <line x1="48" y1="88" x2="144" y2="88" stroke="url(#globe)" stroke-width="2" opacity="0.6"/>
  <line x1="55" y1="68" x2="137" y2="68" stroke="url(#globe)" stroke-width="1.5" opacity="0.4"/>
  <line x1="55" y1="108" x2="137" y2="108" stroke="url(#globe)" stroke-width="1.5" opacity="0.4"/>
  <!-- POLI text -->
  <text x="96" y="158" text-anchor="middle" font-family="Georgia, serif" font-weight="bold" font-size="28" fill="#FDFBF7" letter-spacing="6">POLI</text>
  <!-- Decorative dot -->
  <circle cx="96" cy="42" r="4" fill="#B45309"/>
</svg>
